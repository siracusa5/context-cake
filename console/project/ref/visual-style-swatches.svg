<svg width="100%" viewBox="0 0 1160 640" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif">
<title>ContextCake visual style reference: color ramps and component patterns</title>
<desc>Reference sheet for docs/visual-style.md. Shows four color ramps — blue for layers/storage/cascade, teal for the serve path and MCP, amber for the capture/write path and brand accent, and neutral for background/chrome/text — each with fill, stroke, and text swatches labeled by hex code. Below, five miniature component patterns: a tier/precedence box, a card with a provenance tag pill, a pipeline node with an arrow, a footer chip, and the four arrow marker colors.</desc>

<defs>
<marker id="saw" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#C77D2A"></path></marker>
<marker id="sat" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#2C8A82"></path></marker>
<marker id="sag" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8A8A82"></path></marker>
<marker id="sad" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#57564F"></path></marker>
</defs>

