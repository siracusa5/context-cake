<rect x="490" y="530" width="430" height="290" rx="14" fill="#FFFFFF" stroke="#1A1915" stroke-width="2.5"></rect>
<text x="514" y="560" font-size="13" font-weight="800" letter-spacing="0.5" fill="#1A1915">EFFECTIVE (what agents see)</text>
<text x="514" y="597" font-size="14" font-weight="700" fill="#1A1915">Engine</text>
<rect x="580" y="580" width="58" height="20" rx="10" fill="#D9EAFB" stroke="#3D7AB8"></rect>
<text x="609" y="594" text-anchor="middle" font-size="9" font-weight="700" fill="#0C447C">TEAM</text>
<text x="514" y="618" font-size="12.5" fill="#3A3934">SingleStore (chosen for HTAP workloads).</text>
<line x1="514" y1="634" x2="896" y2="634" stroke="#EDEBE1" stroke-width="1"></line>
<text x="514" y="660" font-size="14" font-weight="700" fill="#1A1915">Backups</text>
<rect x="608" y="643" width="150" height="20" rx="10" fill="#EAF3FC" stroke="#8FB8DE"></rect>
<text x="683" y="657" text-anchor="middle" font-size="9" font-weight="700" fill="#0C447C">COMPANY · INHERITED</text>
<text x="514" y="681" font-size="12.5" fill="#3A3934">Nightly snapshots to cold storage.</text>
<line x1="514" y1="697" x2="896" y2="697" stroke="#EDEBE1" stroke-width="1"></line>
<text x="514" y="719" font-size="11.5" fill="#7A5A28">Disagreements aren&#39;t hidden — the losing layer&#39;s</text>
<text x="514" y="737" font-size="11.5" fill="#7A5A28">value rides along as <tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace">conflicts[]</tspan>, tagged</text>
<text x="514" y="755" font-size="11.5" fill="#7A5A28">with layer + date.</text>
<text x="514" y="799" font-size="10.5" fill="#8A8A82">Section/field merge — not whole-document replacement.</text>

<text x="490" y="836" font-size="12" font-style="italic" fill="#57564F">Per-concept override: <tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-style="normal">override: full</tspan> drops every layer below it.</text>


<text x="60" y="880" font-size="13" font-weight="700" letter-spacing="1" fill="#1E6B64">③ SERVE — AI AGENTS READ THE RESOLVED GRAPH</text>
<text x="60" y="900" font-size="12.5" fill="#57564F">mcp-server.mjs resolves the cascade and exposes it over stdio.</text>

