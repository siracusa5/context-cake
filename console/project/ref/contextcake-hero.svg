<text x="228" y="1055" font-size="11.5" font-style="italic" fill="#57564F">Every response carries contributors + per-section source, so agents can weight facts by trust level.</text>
<text x="228" y="1078" font-size="12" fill="#1A1915">→ read by AI agents and the control-surface dashboard</text>


<text x="60" y="1130" font-size="13" font-weight="700" letter-spacing="1" fill="#7A5A28">④ WRITE PATH — CAPTURE REPO SIGNALS</text>
<text x="60" y="1150" font-size="12.5" fill="#57564F">classify-context.mjs routes signals; write.mjs commits them to a layer.</text>

