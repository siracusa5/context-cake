name: Site Production Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/site-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: site-deploy-production
  cancel-in-progress: true

env:
  CLOUDFLARE_PROJECT_NAME: contextcake
  NODE_VERSION: '22'
  # Exposed so the deploy step can skip cleanly until the secret is configured.
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

defaults:
  run:
    working-directory: site

jobs:
  deploy:
    name: Build and deploy site production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy Cloudflare Pages production
        id: deploy
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=main --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish deploy summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          {
            echo "### Cloudflare Pages production deploy (site)"
            echo ""
            if [ -z "${{ env.CLOUDFLARE_API_TOKEN }}" ]; then
              echo "- Skipped: set the CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets to enable Pages deploys."
            else
              echo "- Deployment URL: $DEPLOYMENT_URL"
              echo "- Live: https://contextcake.com"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
