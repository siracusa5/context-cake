name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  engine:
    name: engine
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run root test suite
        run: npm test

  console:
    name: console
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/console

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  site:
    name: site
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/site

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  desktop:
    name: desktop
    # macOS runner: Electron needs a real windowing environment, and this is
    # the platform the app ships on.
    runs-on: macos-14
    # Hard cap so a boot hang fails in minutes, not at the 6-hour default on a
    # 10x-billed macOS runner.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install console dependencies
        working-directory: apps/console
        run: npm ci

      - name: Build console renderer
        working-directory: apps/console
        run: npm run build:live

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Navigation guard test
        working-directory: apps/desktop
        run: npm run test:navigation

      - name: Smoke test (boot + token gate)
        working-directory: apps/desktop
        shell: bash
        run: npm run smoke | tee smoke.log && grep -q "SMOKE OK" smoke.log

      - name: Smoke test (boot failure fails fast, no hang)
        working-directory: apps/desktop
        run: npm run smoke:bootfail

  required:
    name: required
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - engine
      - console
      - site
      - desktop

    steps:
      - name: Enforce required job results
        run: |
          if [ "${{ needs.engine.result }}" != "success" ] || \
             [ "${{ needs.console.result }}" != "success" ] || \
             [ "${{ needs.site.result }}" != "success" ] || \
             [ "${{ needs.desktop.result }}" != "success" ]; then
            echo "At least one required CI job did not succeed." >&2
            exit 1
          fi
