<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm-dark squircle body -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1d18"/>
      <stop offset="1" stop-color="#0b0c0a"/>
    </linearGradient>
    <!-- Warm amber glow behind the cake -->
    <radialGradient id="glow" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#d9ab53" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#d9ab53" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d9ab53" stop-opacity="0"/>
    </radialGradient>

    <!-- Tier body gradients (base at top -> darker at bottom for cylinder shading) -->
    <linearGradient id="amberBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e2b866"/>
      <stop offset="1" stop-color="#bf8f3c"/>
    </linearGradient>
    <linearGradient id="tealBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#97cbb1"/>
      <stop offset="1" stop-color="#6fa88d"/>
    </linearGradient>
    <linearGradient id="indigoBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#93c0d6"/>
      <stop offset="1" stop-color="#6b9db8"/>
    </linearGradient>

    <!-- Top-face sheens (lit frosting top) -->
    <radialGradient id="amberTop" cx="42%" cy="38%" r="75%">
      <stop offset="0" stop-color="#f6da97"/>
      <stop offset="1" stop-color="#e6c274"/>
    </radialGradient>
    <radialGradient id="tealTop" cx="42%" cy="38%" r="75%">
      <stop offset="0" stop-color="#c2e4d2"/>
      <stop offset="1" stop-color="#a6d4bd"/>
    </radialGradient>
    <radialGradient id="indigoTop" cx="42%" cy="38%" r="75%">
      <stop offset="0" stop-color="#bcdcec"/>
      <stop offset="1" stop-color="#9ecbe0"/>
    </radialGradient>

    <clipPath id="clip">
      <rect x="100" y="100" width="824" height="824" rx="185" ry="185"/>
    </clipPath>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Body -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <rect x="100" y="100" width="824" height="824" fill="url(#glow)"/>

    <!-- ===== Bottom tier: COMPANY (indigo, broad foundation) ===== -->
    <ellipse cx="512" cy="724" rx="272" ry="26" fill="#000000" opacity="0.16" filter="url(#soft)"/>
    <path d="M214,566 L214,670 A298,58 0 0 1 810,670 L810,566 A298,58 0 0 0 214,566 Z" fill="url(#indigoBody)"/>
    <ellipse cx="512" cy="566" rx="298" ry="58" fill="url(#indigoTop)"/>

    <!-- ===== Middle tier: TEAM (teal) ===== -->
    <ellipse cx="512" cy="590" rx="224" ry="22" fill="#000000" opacity="0.18" filter="url(#soft)"/>
    <path d="M284,444 L284,548 A228,46 0 0 1 740,548 L740,444 A228,46 0 0 0 284,444 Z" fill="url(#tealBody)"/>
    <ellipse cx="512" cy="444" rx="228" ry="46" fill="url(#tealTop)"/>

    <!-- ===== Top tier: PERSONAL (amber, most specific) ===== -->
    <ellipse cx="512" cy="466" rx="150" ry="18" fill="#000000" opacity="0.18" filter="url(#soft)"/>
    <path d="M354,330 L354,434 A158,36 0 0 1 670,434 L670,330 A158,36 0 0 0 354,330 Z" fill="url(#amberBody)"/>
    <ellipse cx="512" cy="330" rx="158" ry="36" fill="url(#amberTop)"/>

    <!-- Subtle top-edge sheen across the whole squircle -->
    <rect x="100" y="100" width="824" height="300" fill="#ffffff" opacity="0.015"/>
  </g>

  <!-- Faint inner rim for edge definition on light backgrounds -->
  <rect x="100.75" y="100.75" width="822.5" height="822.5" rx="184.25" ry="184.25"
        fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
</svg>
