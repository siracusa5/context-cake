appId: com.contextcake.app
productName: ContextCake
copyright: © 2026 ContextCake

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json

# The engine and console ship as plain files (not asar) so the CLI shim can
# exec them under ELECTRON_RUN_AS_NODE and the service can serve the console
# dist from disk.
extraResources:
  - from: ../console/dist
    to: console
  - from: ../../packages/core/src
    to: engine/src
  - from: ../../packages/core/fixtures
    to: engine/fixtures
  - from: src/cli
    to: engine/cli
  - from: resources/bin
    to: bin
  # NOTE: do NOT add package.json as an extraResources entry. electron-builder
  # adds every extraResources source to the asar exclude set, so shipping
  # package.json here drops it from app.asar — Electron then can't resolve the
  # app entry point and pack fails its asar sanity check. package.json ships
  # inside app.asar (via the `files` globs above); `contextcake --version`
  # degrades to "unknown" in the packaged CLI, which is best-effort by design.

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Flipped on by the release workflow once Apple Developer credentials exist
  # (specs/contextcake-distribution/design.md §8). Never distribute builds
  # that skipped notarization.
  notarize: false

dmg:
  sign: false

protocols:
  - name: ContextCake
    schemes: [contextcake]

publish:
  provider: github
  owner: ContextCake
  repo: context-cake
